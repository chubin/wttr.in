    active: true
  - specifier: "%p"
    description: "Precipitation"
    active: true
  - specifier: "%D"
    description: "Dawn"
    active: true
  - specifier: "%S"
    description: "Sunrise"
    active: true
  - specifier: "%z"
    description: "Zenith"
    active: true
  - specifier: "%s"
    description: "Sunset"
    active: true
