format_specifiers:
  - specifier: "%c"
    description: "Weather condition"
    active: true
  - specifier: "%C"
    description: "Weather condition text"
    active: true
  - specifier: "%h"
    description: "Humidity"
    active: true
  - specifier: "%t"
    description: "Temperature"
    active: true
